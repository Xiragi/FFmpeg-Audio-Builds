name: Test Full Build
on:
  pull_request:
    branches:
      - master
    paths-ignore:
      - '**.md'
      - 'LICENSE'

env:
  DOCKER_BUILDKIT: 1

jobs:
  build:
    name: Test Full Build
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        target: [win64, winarm64, linux64, linuxarm64]
        variant: [lgpl-audio]
        quickbuild: [1]
        include:
          - target: win64
            variant: gpl
            quickbuild: ''
          - target: linux64
            variant: lgpl
            quickbuild: ''
    steps:
      - name: Free Disk-Space
        run: df -h && sudo apt-get clean && docker system prune -a -f && sudo rm -rf /opt/ghc /usr/local/.ghcup /usr/local/lib/android && df -h
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install buildx
        uses: docker/setup-buildx-action@v4
        with:
          buildkitd-config: .github/buildkit.toml
          driver: docker
      - name: Get download cache key
        id: dl_cache
        run: |
          echo "dltagname=$(./util/get_dl_cache_tag.sh)" >> $GITHUB_OUTPUT
      - name: Cache
        uses: actions/cache/restore@v5
        with:
          path: .cache/downloads
          key: download-cache-${{ steps.dl_cache.outputs.dltagname }}
          restore-keys: |
            download-cache-
      - name: Build Image
        run: ./makeimage.sh ${{ matrix.target }} ${{ matrix.variant }}
        env:
          QUICKBUILD: ${{ matrix.quickbuild }}
      - name: Build ffmpeg
        run: ./build.sh ${{ matrix.target }} ${{ matrix.variant }}
      - name: Replace spaces in string
        id: strs
        run: |
          SLUG="${{ matrix.target }}-${{ matrix.variant }}"
          echo "artifact_slug=${SLUG// /-}" >> $GITHUB_OUTPUT
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ffmpeg-${{ steps.strs.outputs.artifact_slug }}
          overwrite: true
          path: artifacts/*

  build_macos:
    name: Test macOS Build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15-intel, macos-14]
        variant: [lgpl-audio]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install dependencies
        run: |
          brew update
          brew install nasm yasm pkg-config lame opus libvorbis xz
      - name: Clone FFmpeg
        run: |
          git clone --filter=blob:none --depth=1 https://github.com/FFmpeg/FFmpeg.git ffmpeg
      - name: Build FFmpeg
        run: |
          BREW_PREFIX="$(brew --prefix)"
          export PKG_CONFIG_PATH="$BREW_PREFIX/lib/pkgconfig"
          export TARGET=macos
          
          cd ffmpeg
          source ../variants/defaults-${{ matrix.variant }}.sh
          
          ./configure --prefix=../prefix \
            --pkg-config-flags="--static" \
            --extra-version="$(date +%Y%m%d)" \
            --extra-cflags="-I$BREW_PREFIX/include" \
            --extra-ldflags="-L$BREW_PREFIX/lib" \
            $FF_CONFIGURE \
            --pkg-config="pkg-config --static" \
            --enable-static \
            --disable-shared
            
          make -j$(sysctl -n hw.ncpu)
          make install
      - name: Package artifacts
        run: |
          OS_ARCH="$(uname -m)"
          BUILD_NAME="ffmpeg-test-macos-${OS_ARCH}-${{ matrix.variant }}"
          mkdir -p "pkgroot/$BUILD_NAME/bin"
          cp prefix/bin/ffmpeg "pkgroot/$BUILD_NAME/bin/"
          cp ffmpeg/COPYING.LGPLv3 "pkgroot/$BUILD_NAME/LICENSE.txt"
          
          mkdir artifacts
          cd pkgroot
          tar cJf "../artifacts/${BUILD_NAME}.tar.xz" "$BUILD_NAME"
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ffmpeg-macos-${{ matrix.os }}-${{ matrix.variant }}
          overwrite: true
          path: artifacts/*
